<div class="modal fade" id="reopenConfirmModal" tabindex="-1" role="dialog"
     aria-labelledby="reopenModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="reopenModalLabel">Confirm</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                Are you sure you want to reopen this board?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="reopenBoard()">Reopen board
                </button>
            </div>
        </div>
    </div>
</div>
<script>
    function reopenBoard() {
        const reopenUrl = "{% url 'board_reopen' board.id %}";
        fetch(reopenUrl, {
            method: 'POST',
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        })
        .then(response => {
            if (response.ok) {
                window.location.reload();
            } else {
                console.error('Failed to reopen the board');
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>
