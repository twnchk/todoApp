<div class="modal fade" id="deleteBoardModal" tabindex="-1" role="dialog"
     aria-labelledby="deleteBoardModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteBoardModalLabel">Confirm</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete this board?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBoard">Delete board</button>
            </div>
        </div>
    </div>
</div>
<script>
    $('#deleteBoardModal').on('show.bs.modal', function (event) {
        var button = $(event.relatedTarget);
        var boardId = button.data('boardid');

        $('#confirmDeleteBoard').off('click');
        $('#confirmDeleteBoard').on('click', function () {
            var deleteUrl = `/boards/${boardId}/delete`;
            $.ajax({
                url: deleteUrl,
                type: "POST",
                success: function () {
                    window.location.reload();
                },
                error: function (error) {
                    console.error('Error:', error);
                }
            });
        });
    });
</script>
