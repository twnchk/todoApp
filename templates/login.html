{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %} TODO Login {% endblock %}
{% block content %}
<div class="container rounded-container form-card">
    <h1>Sign in!</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Login</button>
    </form>
    <div class="text-center">
        <p>Forgot your password? <a href="{% url 'password_reset' %}">Reset password</a></p>
        <p>Not a member? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
<script>
    console.log({{form.errors}});
</script>
{% endblock %}
